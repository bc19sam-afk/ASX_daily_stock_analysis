name: Record Trade

on:
  workflow_dispatch:
    inputs:
      code:
        description: 'Stock code (example: AAPL)'
        required: true
      side:
        description: 'Trade side'
        required: true
        type: choice
        options:
          - BUY
          - SELL
      quantity:
        description: 'Executed quantity'
        required: true
      price:
        description: 'Executed price'
        required: true
      fee:
        description: 'Fee (default 0)'
        required: false
        default: '0'

jobs:
  record-trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/stock_analysis.db
          key: stock-db-${{ runner.os }}
          restore-keys: |
            stock-db-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Record trade from form inputs
        run: |
          mkdir -p data
          python scripts/manual_portfolio_workflows.py record-trade \
            --code "${{ github.event.inputs.code }}" \
            --side "${{ github.event.inputs.side }}" \
            --quantity "${{ github.event.inputs.quantity }}" \
            --price "${{ github.event.inputs.price }}" \
            --fee "${{ github.event.inputs.fee }}"

      - name: Save database cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/stock_analysis.db
          key: stock-db-${{ runner.os }}
